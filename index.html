<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Global Geopolitical Monitor - SATELLITE OMNI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { orbitron: ['Orbitron', 'sans-serif'], inter: ['Inter', 'sans-serif'] },
                    colors: { cyber: { dark: '#0a0a0f', panel: '#13131a', border: '#2a2a35' } }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <style>
        body { background-color: #0a0a0f; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #13131a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .leaflet-popup-content-wrapper {
            background-color: #1e293b !important;
            color: #f8fafc !important;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            font-family: 'Inter', sans-serif;
        }
        .leaflet-popup-tip { background-color: #1e293b !important; }
        .leaflet-container { background: #0a0a0f; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="font-inter h-screen flex flex-col overflow-hidden">

    <!-- HEADER -->
    <header class="bg-cyber-panel border-b border-cyber-border h-16 flex items-center justify-between px-6 shrink-0 z-10">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]" id="status-led"></div>
            <h1 class="font-orbitron text-xl md:text-2xl font-bold tracking-wider text-gray-100 uppercase">
                Global Geopolitical <span class="text-blue-500">Monitor</span>
            </h1>
        </div>
        <div class="font-orbitron text-sm md:text-lg text-blue-400 bg-blue-900/20 px-4 py-1 rounded border border-blue-800/50">
            UTC: <span id="utc-clock">00:00:00</span>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex flex-col lg:flex-row flex-1 overflow-hidden">
        <section class="w-full lg:w-[70%] h-[50vh] lg:h-full relative z-0">
            <div id="map" class="w-full h-full"></div>
            <div class="pointer-events-none absolute inset-0 shadow-[inset_0_0_50px_rgba(0,0,0,0.9)] z-[400]"></div>
        </section>

        <section class="w-full lg:w-[30%] h-[50vh] lg:h-full bg-cyber-panel border-l border-cyber-border flex flex-col z-10">
            <div class="p-4 border-b border-cyber-border bg-gray-900/50 flex justify-between items-center">
                <h2 class="font-orbitron text-sm font-semibold text-gray-400 tracking-widest uppercase">Live Intel Feed</h2>
                <span class="text-[10px] text-green-400 animate-pulse font-mono">CORE SYSTEM ONLINE</span>
            </div>
            <div id="news-feed" class="flex-1 overflow-y-auto p-4 space-y-3">
                <!-- Data injection via JS -->
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // Orologio UTC in tempo reale
        function updateClock() {
            document.getElementById('utc-clock').textContent = new Date().toISOString().substring(11, 19);
        }
        setInterval(updateClock, 1000); updateClock();

        // Inizializzazione Mappa Radar
        const map = L.map('map', { zoomControl: false }).setView([35.0, 35.0], 3);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

        // Database locale notizie Geopolitiche - Giugno 2026
        const staticIntelData = [
            {
                id: 1, lat: 48.37, lng: 31.16, country: "UCRAINA",
                title: "Raid droni intercettato su snodi energetici",
                summary: "La difesa aerea ha abbattuto 14 vettori guidati diretti verso le infrastrutture elettriche occidentali. Allerta massima nei distretti di confine.",
                severity: "critical", time: "10 min fa"
            },
            {
                id: 2, lat: 31.4, lng: 34.4, country: "STRISCIA DI GAZA",
                title: "Raid aerei nell'area sud, stallo diplomazia",
                summary: "Nuove operazioni aeree coordinate registrate nelle ultime ore. I mediatori internazionali segnalano forti difficoltà nel riprendere i tavoli negoziali.",
                severity: "critical", time: "24 min fa"
            },
            {
                id: 3, lat: 23.69, lng: 120.96, country: "TAIWAN",
                title: "Sottomarini non identificati rilevati nello Stretto",
                summary: "Il ministero della Difesa di Taipei ha schierato unità di pattugliamento marittimo dopo il rilevamento di tracciati sonar anomali vicino alla linea mediana.",
                severity: "warning", time: "1 ora fa"
            },
            {
                id: 4, lat: 32.42, lng: 53.68, country: "IRAN",
                title: "Esercitazioni missilistiche nel deserto centrale",
                summary: "Teheran ha avviato test balistici a corto raggio non annunciati. I sistemi radar della coalizione monitorano la traiettoria dei vettori.",
                severity: "warning", time: "2 ore fa"
            },
            {
                id: 5, lat: 15.55, lng: 48.51, country: "YEMEN",
                title: "Attacco missilistico fallito contro cargo mercantile",
                summary: "Un missile balistico antinave è esploso a circa 20 miglia nautiche da una nave commerciale battente bandiera greca nel Golfo di Aden.",
                severity: "critical", time: "4 ore fa"
            },
            {
                id: 6, lat: 40.33, lng: 127.51, country: "COREA DEL NORD",
                title: "Schieramento artiglieria pesante lungo la DMZ",
                summary: "Immagini satellitari commerciali mostrano un insolito movimento di pezzi semoventi d'artiglieria nordcoreana raggruppati vicino al confine fortificato.",
                severity: "warning", time: "6 ore fa"
            }
        ];

        const markerRefs = {};
        window.focusOnMap = (id, lat, lng) => {
            map.flyTo([lat, lng], 5, { animate: true, duration: 1.2 });
            setTimeout(() => { if(markerRefs[id]) markerRefs[id].openPopup(); }, 1200);
        };

        // Generazione dei Pin e del Feed Laterale
        function renderDashboard() {
            const feed = document.getElementById('news-feed');
            feed.innerHTML = "";

            staticIntelData.forEach(article => {
                // 1. Configurazione Icona Lampeggiante
                let colorClass = article.severity === 'critical' ? 'bg-red-600 border-red-800' : 'bg-yellow-500 border-yellow-700';
                let pingColor = article.severity === 'critical' ? 'bg-red-400' : 'bg-yellow-400';

                const customIcon = L.divIcon({
                    className: 'custom-pin',
                    html: `
                        <div class="relative flex h-8 w-8 items-center justify-center cursor-pointer">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full ${pingColor} opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-6 w-6 ${colorClass} text-white font-bold items-center justify-center text-sm shadow-[0_0_15px_rgba(0,0,0,0.8)] border-2">!</span>
                        </div>
                    `,
                    iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -16]
                });

                // Contenuto Popup elegante
                const popupContent = `
                    <div class="min-w-[210px]">
                        <h3 class="font-orbitron font-bold text-sm text-${article.severity === 'critical' ? 'red' : 'yellow'}-400 uppercase mb-1">${article.country}</h3>
                        <p class="font-bold text-gray-100 text-xs leading-tight mb-2">${article.title}</p>
                        <p class="text-[11px] text-gray-400 leading-snug">${article.summary}</p>
                        <span class="text-[9px] text-gray-500 font-mono block mt-2">REGISTRAZIONE: ${article.time}</span>
                    </div>
                `;

                const marker = L.marker([article.lat, article.lng], { icon: customIcon }).addTo(map).bindPopup(popupContent);
                markerRefs[article.id] = marker;

                // 2. Creazione elemento nella Sidebar
                let badgeColors = article.severity === 'critical' ? 'bg-red-900/40 text-red-400 border-red-800' : 'bg-yellow-900/40 text-yellow-400 border-yellow-800';

                const newsItem = document.createElement('div');
                newsItem.className = "p-3 bg-[#1a1a24] border border-cyber-border rounded hover:border-gray-500 transition-colors cursor-pointer group";
                newsItem.setAttribute("onclick", `focusOnMap(${article.id}, ${article.lat}, ${article.lng})`);
                newsItem.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-orbitron px-2 py-0.5 border rounded uppercase ${badgeColors}">${article.severity}</span>
                        <span class="text-[9px] text-gray-500 font-mono">${article.time}</span>
                    </div>
                    <h3 class="font-semibold text-xs text-gray-200 group-hover:text-white transition-colors leading-tight mb-1">
                        [${article.country}] ${article.title}
                    </h3>
                `;
                feed.appendChild(newsItem);
            });
        }

        // Esegui il boot del sistema radar
        setTimeout(renderDashboard, 800);
    </script>
</body>
</html>
