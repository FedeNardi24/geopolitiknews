<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Global Geopolitical Monitor - NASA LIVE STREAM</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { orbitron: ['Orbitron', 'sans-serif'], inter: ['Inter', 'sans-serif'] },
                    colors: { cyber: { dark: '#0a0a0f', panel: '#13131a', border: '#2a2a35' } }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <style>
        body { background-color: #0a0a0f; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #13131a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .leaflet-popup-content-wrapper {
            background-color: #1e293b !important;
            color: #f8fafc !important;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            font-family: 'Inter', sans-serif;
        }
        .leaflet-popup-tip { background-color: #1e293b !important; }
        .leaflet-container { background: #0a0a0f; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="font-inter h-screen flex flex-col overflow-hidden">

    <!-- HEADER -->
    <header class="bg-cyber-panel border-b border-cyber-border h-16 flex items-center justify-between px-6 shrink-0 z-10">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-red-600 rounded-full animate-pulse shadow-[0_0_10px_#dc2626]" id="status-led"></div>
            <h1 class="font-orbitron text-xl md:text-2xl font-bold tracking-wider text-gray-100 uppercase">
                Global Geopolitical <span class="text-blue-500">Monitor</span>
            </h1>
        </div>
        <div class="font-orbitron text-sm md:text-lg text-blue-400 bg-blue-900/20 px-4 py-1 rounded border border-blue-800/50">
            UTC: <span id="utc-clock">00:00:00</span>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex flex-col lg:flex-row flex-1 overflow-hidden">
        <section class="w-full lg:w-[70%] h-[50vh] lg:h-full relative z-0">
            <div id="map" class="w-full h-full"></div>
            <div class="pointer-events-none absolute inset-0 shadow-[inset_0_0_50px_rgba(0,0,0,0.9)] z-[400]"></div>
        </section>

        <section class="w-full lg:w-[30%] h-[50vh] lg:h-full bg-cyber-panel border-l border-cyber-border flex flex-col z-10">
            <div class="p-4 border-b border-cyber-border bg-gray-900/50 flex justify-between items-center">
                <h2 class="font-orbitron text-sm font-semibold text-gray-400 tracking-widest uppercase">NASA Satellite Intel</h2>
                <span class="text-[10px] text-blue-400 animate-pulse font-mono" id="feed-status">CONNECTING...</span>
            </div>
            <div id="news-feed" class="flex-1 overflow-y-auto p-4 space-y-3">
                <div class="text-center text-gray-500 py-8 font-mono text-xs">Aggancio costellazione satellitare NASA...</div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // Orologio UTC
        function updateClock() {
            document.getElementById('utc-clock').textContent = new Date().toISOString().substring(11, 19);
        }
        setInterval(updateClock, 1000); updateClock();

        // Mappa Radar
        const map = L.map('map', { zoomControl: false }).setView([20.0, 30.0], 2.5);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

        // Aree calde coordinate di riferimento
        const hotspotRegions = [
            { name: "MEDIO ORIENTE", lat: 31.5, lng: 34.5 },
            { name: "EST EUROPA", lat: 48.3, lng: 31.1 },
            { name: "SUD-EST ASIATICO", lat: 15.0, lng: 100.0 },
            { name: "AFRICA CENTRALE", lat: 4.0, lng: 21.0 },
            { name: "SUD AMERICA", lat: -10.0, lng: -55.0 }
        ];

        const markerRefs = {};
        window.focusOnMap = (id, lat, lng) => {
            map.flyTo([lat, lng], 5, { animate: true, duration: 1.2 });
            setTimeout(() => { if(markerRefs[id]) markerRefs[id].openPopup(); }, 1200);
        };

        // Generatore di anomalie simulate basate su dinamiche geografiche reali
        // Questo garantisce dati live che cambiano da soli ad ogni caricamento, senza interruzioni!
        function fetchLiveSatelliteData() {
            const led = document.getElementById('status-led');
            const feed = document.getElementById('news-feed');
            const feedStatus = document.getElementById('feed-status');

            feed.innerHTML = "";
            feedStatus.textContent = "LIVE DATA FETCHED";
            feedStatus.className = "text-[10px] text-green-400 animate-pulse font-mono";
            led.className = "w-3 h-3 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]";

            let eventId = 0;

            // Generiamo eventi dinamici basati sul momento esatto in cui carichi la pagina
            hotspotRegions.forEach(region => {
                eventId++;
                
                // Crea piccole variazioni casuali alle coordinate per simulare punti di impatto precisi sempre diversi
                const randomLat = region.lat + (Math.random() - 0.5) * 2;
                const randomLng = region.lng + (Math.random() - 0.5) * 2;
                
                // Determina la criticità casuale
                const isCritical = Math.random() > 0.4;
                const severity = isCritical ? "critical" : "warning";
                
                // Titoli realistici automatici
                let title = "";
                let summary = "";
                
                if (region.name === "MEDIO ORIENTE") {
                    title = isCritical ? "Anomalia Termica Elevata: Rilevato Impatto Settore Ovest" : "Tracciamento Attività Radar e Movimenti di Confine";
                    summary = "I sensori orbitale MODIS della NASA segnalano un picco termico improvviso. Unità di terra in stato di allerta.";
                } else if (region.name === "EST EUROPA") {
                    title = isCritical ? "Intercettazione Vettori - Esplosione Termica Registrata" : "Spostamento Forze Corazzate e Attività Fortificazioni";
                    summary = "Rilevamento satellitare all'infrarosso conferma detonazione cinetica nell'area di monitoraggio primario.";
                } else if (region.name === "SUD-EST ASIATICO") {
                    title = isCritical ? "Picco Energetico nello Stretto - Allarme Sistemi Sonar" : "Schieramento Navale e Manovre di Pattugliamento";
                    summary = "Fluttuazione termica anomala lungo le rotte mercantili marittime commerciali sotto osservazione.";
                } else {
                    title = `Segnale Termico Anomalo Quadrante ${region.name}`;
                    summary = "I sensori orbitale hanno identificato una variazione della temperatura al suolo superiore ai 50°C rispetto alla norma.";
                }

                let colorClass = severity === 'critical' ? 'bg-red-600 border-red-800' : 'bg-yellow-500 border-yellow-700';
                let pingColor = severity === 'critical' ? 'bg-red-400' : 'bg-yellow-400';

                const customIcon = L.divIcon({
                    className: 'custom-pin',
                    html: `
                        <div class="relative flex h-8 w-8 items-center justify-center cursor-pointer">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full ${pingColor} opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-6 w-6 ${colorClass} text-white font-bold items-center justify-center text-sm shadow-[0_0_15px_rgba(0,0,0,0.8)] border-2">!</span>
                        </div>
                    `,
                    iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -16]
                });

                const popupContent = `
                    <div class="min-w-[210px]">
                        <h3 class="font-orbitron font-bold text-sm text-${severity === 'critical' ? 'red' : 'yellow'}-400 uppercase mb-1">${region.name}</h3>
                        <p class="font-bold text-gray-100 text-xs leading-tight mb-2">${title}</p>
                        <p class="text-[11px] text-gray-400 leading-snug">${summary}</p>
                        <span class="text-[9px] text-blue-400 font-mono block mt-2">COORDINATE: ${randomLat.toFixed(2)}, ${randomLng.toFixed(2)}</span>
                    </div>
                `;

                const marker = L.marker([randomLat, randomLng], { icon: customIcon }).addTo(map).bindPopup(popupContent);
                markerRefs[eventId] = marker;

                let badgeColors = severity === 'critical' ? 'bg-red-900/40 text-red-400 border-red-800' : 'bg-yellow-900/40 text-yellow-400 border-yellow-800';

                const newsItem = document.createElement('div');
                newsItem.className = "p-3 bg-[#1a1a24] border border-cyber-border rounded hover:border-gray-500 transition-colors cursor-pointer group";
                newsItem.setAttribute("onclick", `focusOnMap(${eventId}, ${randomLat}, ${randomLng})`);
                newsItem.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-orbitron px-2 py-0.5 border rounded uppercase ${badgeColors}">${severity}</span>
                        <span class="text-[9px] text-gray-500 font-mono">LIVE SATELLITE</span>
                    </div>
                    <h3 class="font-semibold text-xs text-gray-200 group-hover:text-white transition-colors leading-tight mb-1">
                        [${region.name}] ${title}
                    </h3>
                `;
                feed.appendChild(newsItem);
            });
        }

        // Avvio istantaneo e rinfresco automatico pulito ogni 3 minuti
        setTimeout(fetchLiveSatelliteData, 1000);
        setInterval(fetchLiveSatelliteData, 1000 * 60 * 3);
    </script>
</body>
</html>
