<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Global Geopolitical Monitor - LIVE</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { orbitron: ['Orbitron', 'sans-serif'], inter: ['Inter', 'sans-serif'] },
                    colors: { cyber: { dark: '#0a0a0f', panel: '#13131a', border: '#2a2a35' } }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <style>
        body { background-color: #0a0a0f; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #13131a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .leaflet-popup-content-wrapper {
            background-color: #1e293b !important;
            color: #f8fafc !important;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            font-family: 'Inter', sans-serif;
        }
        .leaflet-popup-tip { background-color: #1e293b !important; }
        .leaflet-container { background: #0a0a0f; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="font-inter h-screen flex flex-col overflow-hidden">

    <header class="bg-cyber-panel border-b border-cyber-border h-16 flex items-center justify-between px-6 shrink-0 z-10">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse" id="status-led"></div>
            <h1 class="font-orbitron text-xl md:text-2xl font-bold tracking-wider text-gray-100 uppercase">
                Global Geopolitical <span class="text-blue-500">Monitor</span>
            </h1>
        </div>
        <div class="font-orbitron text-sm md:text-lg text-blue-400 bg-blue-900/20 px-4 py-1 rounded border border-blue-800/50">
            UTC: <span id="utc-clock">00:00:00</span>
        </div>
    </header>

    <main class="flex flex-col lg:flex-row flex-1 overflow-hidden">
        <section class="w-full lg:w-[70%] h-[50vh] lg:h-full relative z-0">
            <div id="map" class="w-full h-full"></div>
            <div class="pointer-events-none absolute inset-0 shadow-[inset_0_0_50px_rgba(0,0,0,0.9)] z-[400]"></div>
        </section>

        <section class="w-full lg:w-[30%] h-[50vh] lg:h-full bg-cyber-panel border-l border-cyber-border flex flex-col z-10">
            <div class="p-4 border-b border-cyber-border bg-gray-900/50 flex justify-between items-center">
                <h2 class="font-orbitron text-sm font-semibold text-gray-400 tracking-widest uppercase">Live Intel Feed</h2>
                <span class="text-[10px] text-blue-400 animate-pulse font-mono">LIVE FEED ACTIVE</span>
            </div>
            <div id="news-feed" class="flex-1 overflow-y-auto p-4 space-y-3">
                <div class="text-center text-gray-500 py-8 font-mono text-xs">Inizializzazione uplink satellitare...</div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // Orologio
        function updateClock() {
            document.getElementById('utc-clock').textContent = new Date().toISOString().substring(11, 19);
        }
        setInterval(updateClock, 1000); updateClock();

        // Mappa
        const map = L.map('map', { zoomControl: false }).setView([30.0, 20.0], 2.5);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

        // Dizionario geografico per mappare i paesi alle coordinate (Geocoding leggero)
        const countryCoordinates = {
            "israel": [31.5, 34.75], "palestine": [31.9, 35.2], "gaza": [31.4, 34.4],
            "ukraine": [48.37, 31.16], "taiwan": [23.69, 120.96], "iran": [32.42, 53.68],
            "yemen": [15.55, 48.51], "syria": [34.8, 38.9], "russia": [61.52, 105.31],
            "usa": [37.09, -95.71], "united states": [37.09, -95.71], "china": [35.86, 104.195],
            "north korea": [40.33, 127.51], "south korea": [35.9, 127.76], "lebanon": [33.85, 35.86],
            "iraq": [33.22, 43.67], "libya": [26.33, 17.22], "sudan": [12.86, 30.21],
            "kosovo": [42.6, 20.9], "serbia": [44.01, 21.0], "venezuela": [6.42, -66.58]
        };

        const markerRefs = {};
        window.focusOnMap = (id, lat, lng) => {
            map.flyTo([lat, lng], 5, { animate: true, duration: 1.2 });
            setTimeout(() => { if(markerRefs[id]) markerRefs[id].openPopup(); }, 1200);
        };

        /* =======================================================
           CONNESSIONE AUTOMATICA - FLUSSO GEO-NOTIZIE GDELT
        ======================================================= */
        async function updateGeopoliticalDashboard() {
            const led = document.getElementById('status-led');
            const feed = document.getElementById('news-feed');

            // Feed live globale di GDELT in formato JSON, filtrato per eventi internazionali caldi
            const url = `https://api.gdeltproject.org/api/v2/doc/doc?query=(geopolitics%20OR%20conflict%20OR%20military)&mode=updatesrecs&format=json&timespan=6h`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Uplink fallito");
                const data = await response.json();
                
                feed.innerHTML = ""; 
                let articleId = 0;

                if (!data.articles || data.articles.length === 0) throw new Error("Nessun dato");

                // Prendiamo le prime 12 notizie più recenti
                data.articles.slice(0, 12).forEach(article => {
                    articleId++;
                    const textToAnalyze = (article.title + " " + (article.socialimage || "")).toLowerCase();
                    
                    let lat = 40.74; 
                    let lng = -73.96;
                    let detectedCountry = "GLOBAL INTEL";
                    let severity = "info";

                    for (const [country, coords] of Object.entries(countryCoordinates)) {
                        if (textToAnalyze.includes(country)) {
                            lat = coords[0];
                            lng = coords[1];
                            detectedCountry = country.toUpperCase();
                            severity = "warning";
                            break;
                        }
                    }

                    if (textToAnalyze.match(/(attack|killed|missile|bombing|clash|war|explosion|strike|military|border|troops)/)) {
                        severity = "critical";
                    }

                    let colorClass = severity === 'critical' ? 'bg-red-600 border-red-800' : 
                                     severity === 'warning' ? 'bg-yellow-500 border-yellow-700' : 'bg-blue-500 border-blue-700';
                    let pingColor = severity === 'critical' ? 'bg-red-400' : 
                                    severity === 'warning' ? 'bg-yellow-400' : 'bg-blue-400';

                    const customIcon = L.divIcon({
                        className: 'custom-pin',
                        html: `
                            <div class="relative flex h-8 w-8 items-center justify-center cursor-pointer">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full ${pingColor} opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-6 w-6 ${colorClass} text-white font-bold items-center justify-center text-sm shadow-[0_0_15px_rgba(0,0,0,0.8)] border-2">!</span>
                            </div>
                        `,
                        iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -16]
                    });

                    const popupContent = `
                        <div class="min-w-[200px]">
                            <h3 class="font-orbitron font-bold text-sm text-${severity === 'critical' ? 'red' : severity === 'warning' ? 'yellow' : 'blue'}-400 uppercase mb-1">${detectedCountry}</h3>
                            <p class="font-bold text-gray-100 text-xs leading-tight mb-2">${article.title}</p>
                            <a href="${article.url}" target="_blank" class="text-[10px] text-blue-400 underline block mb-1">Apri Fonte Intel ↗</a>
                        </div>
                    `;

                    const marker = L.marker([lat, lng], { icon: customIcon }).addTo(map).bindPopup(popupContent);
                    markerRefs[articleId] = marker;

                    let badgeColors = severity === 'critical' ? 'bg-red-900/40 text-red-400 border-red-800' : 
                                      severity === 'warning' ? 'bg-yellow-900/40 text-yellow-400 border-yellow-800' : 'bg-blue-900/40 text-blue-400 border-blue-800';

                    const newsItem = document.createElement('div');
                    newsItem.className = "p-3 bg-[#1a1a24] border border-cyber-border rounded hover:border-gray-500 transition-colors cursor-pointer group";
                    newsItem.setAttribute("onclick", `focusOnMap(${articleId}, ${lat}, ${lng})`);
                    newsItem.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-orbitron px-2 py-0.5 border rounded uppercase ${badgeColors}">${severity}</span>
                            <span class="text-[9px] text-gray-500 font-mono">LIVE</span>
                        </div>
                        <h3 class="font-semibold text-xs text-gray-200 group-hover:text-white transition-colors leading-tight mb-1">
                            [${detectedCountry}] ${article.title}
                        </h3>
                    `;
                    feed.appendChild(newsItem);
                });

                led.className = "w-3 h-3 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]";

            } catch (error) {
                console.error(error);
                feed.innerHTML = `<div class="text-center text-red-400 py-8 font-mono text-xs">Errore ricezione dati satellitari. Sincronizzazione in corso...</div>`;
                led.className = "w-3 h-3 bg-red-600 rounded-full shadow-[0_0_10px_#dc2626]";
            }
        }

        setTimeout(updateGeopoliticalDashboard, 1000);
        setInterval(updateGeopoliticalDashboard, 1000 * 60 * 5);
    </script>
</body>
</html>
